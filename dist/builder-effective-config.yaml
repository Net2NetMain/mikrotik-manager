directories:
  output: dist
  buildResources: build
appId: co.anysmart.net2net-manager
productName: Net2Net Manager
copyright: Copyright © 2026 Net2Net
publish:
  provider: github
  owner: YOUR_GITHUB_USERNAME
  repo: mikrotik-manager
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: icon.png
nsis:
  installerIcon: icon.png
  shortcutName: Net2Net Manager
  oneClick: true
  perMachine: false
linux:
  target: AppImage
files:
  - filter:
      - main.js
      - preload.js
      - mikrotik-api.js
      - ssh-test.js
      - index.html
      - icon.png
      - splash.png
      - node_modules/**/*
electronVersion: 28.3.3
